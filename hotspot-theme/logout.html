<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الخروج - شبكة الواي فاي</title>
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-container">
        <div class="circle circle-1" style="background: #ef4444;"></div>
        <div class="circle circle-2" style="background: #f59e0b;"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="login-container">
        <div class="glass-panel">
            <div class="logo-container">
                <div class="wifi-icon" style="background: linear-gradient(135deg, #ef4444, #f59e0b);">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 22C17.5 22 22 17.5 22 12C22 6.5 17.5 2 12 2C6.5 2 2 6.5 2 12C2 17.5 6.5 22 12 22Z"
                            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M15 9L9 15M9 9L15 15" stroke="white" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </div>
                <h1>تم تسجيل الخروج</h1>
                <p>شكراً لاستخدامك شبكتنا، نتمنى لك يوماً سعيداً</p>
            </div>

            <div class="status-info">
                <div class="status-row">
                    <span class="status-label">اسم المستخدم</span>
                    <span class="status-value">$(username)</span>
                </div>
                <div class="status-row">
                    <span class="status-label">مدة الاتصال</span>
                    <span class="status-value">$(uptime)</span>
                </div>
                <div class="status-row">
                    <span class="status-label">حجم الاستهلاك</span>
                    <span class="status-value">$(bytes-in-nice) / $(bytes-out-nice)</span>
                </div>
            </div>

            <form action="$(link-login)" name="login" onSubmit="return openLogin()">
                <button type="submit" class="btn-login"
                    style="background: linear-gradient(135deg, #3b82f6, #8b5cf6);">إعادة الاتصال</button>
            </form>
        </div>
    </div>

    <script type="text/javascript">
        function openLogin() {
            if (window.name != 'hotspot_logout') return true;
            open('$(link-login)', '_blank', '');
            window.close();
            return false;
        }
    </script>
</body>

</html>
